name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
            target: ""
          # Windows MSI — Epic 35 Story 01. Code-signing cert is Epic
          # 34 Story 02; until that lands the MSI ships unsigned and
          # SmartScreen will warn on first install. Bundle still builds.
          - platform: windows-latest
            args: --bundles msi
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" httui-desktop/src-tauri/tauri.conf.json && rm httui-desktop/src-tauri/tauri.conf.json.bak
          # Update httui-desktop/package.json (the desktop workspace)
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" httui-desktop/package.json && rm httui-desktop/package.json.bak
          # Update Cargo.toml of the tauri crate
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" httui-desktop/src-tauri/Cargo.toml && rm httui-desktop/src-tauri/Cargo.toml.bak

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          # Pull the matching `## [VERSION]` section out of CHANGELOG.md.
          # Falls back to a generic body when the section is missing so a
          # tag without a CHANGELOG entry still ships.
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          if [ -f CHANGELOG.md ] && grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            awk -v v="${VERSION}" '
              $0 ~ "^## \\[" v "\\]" { found = 1; next }
              found && /^## \[/        { exit }
              found                    { print }
            ' CHANGELOG.md > "$NOTES_FILE"
            echo "Extracted notes for $VERSION (CHANGELOG)"
          else
            echo "No CHANGELOG section for $VERSION; using generic body" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "See the assets below to download and install." >> "$NOTES_FILE"
          fi
          # Surface the file path to subsequent steps via outputs.
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          # Detect prerelease: tags shaped `vX.Y.Z-rc.N` are prereleases.
          if [[ "$GITHUB_REF_NAME" =~ -rc\.[0-9]+$ ]] || [[ "$GITHUB_REF_NAME" =~ -beta\.[0-9]+$ ]] || [[ "$GITHUB_REF_NAME" =~ -alpha\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build sidecar
        run: |
          cd httui-sidecar && bun install && bun run build

      - name: Debug - list bundle directory
        if: always()
        run: |
          find target -path "*/bundle/*" -type f 2>/dev/null || echo "No bundle directory found"

      - name: Read release body
        id: body
        shell: bash
        run: |
          # GitHub Actions multi-line outputs need the heredoc form.
          {
            echo 'body<<HTTUI_NOTES_EOF'
            cat "${{ steps.notes.outputs.path }}"
            echo HTTUI_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: httui-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "httui notes ${{ github.ref_name }}"
          releaseBody: ${{ steps.body.outputs.body }}
          releaseDraft: false
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
          args: ${{ matrix.args }}
